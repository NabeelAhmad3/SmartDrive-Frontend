<div class="fullForm mt-4">
  <div class="form-container">
    <h2>Reset Password</h2>

    <div *ngIf="!success">
      <div class="form-group">
        <input type="password" [(ngModel)]="newPassword" class="form-control" placeholder="New password (8-20 chars)" />
      </div>
      <div class="form-group mt-2">
        <input type="password" [(ngModel)]="confirmPassword" class="form-control" placeholder="Confirm new password" />
      </div>
      <div *ngIf="errorMessage" class="text-danger mt-2">
        {{ errorMessage }}
      </div>
      <button (click)="resetPassword()" [disabled]="isLoading" class="mt-4 mb-4">
        {{ isLoading ? 'Resetting...' : 'Reset Password' }}
      </button>
    </div>

    <div *ngIf="success" class="alert-success">
      ✅ Password reset! <a routerLink="/login">Login now</a>
    </div>
  </div>
</div>
