<div class="auth-page">
  <div class="auth-card">

    <div class="auth-icon-box">
      <ion-icon name="key-outline"></ion-icon>
    </div>

    <h2 class="auth-title">Reset password</h2>
    <p class="auth-subtitle">Choose a strong password for your account.</p>

    <div *ngIf="!success">

      <label class="auth-label">New password</label>
      <div class="auth-input-wrap">
        <ion-icon name="lock-closed-outline" class="auth-input-icon"></ion-icon>
        <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="newPassword" placeholder="8–20 characters"
          class="auth-input" />
        <button (click)="showPassword = !showPassword" class="input-action-btn">
          <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
        </button>
      </div>

      <label class="auth-label">Confirm password</label>
      <div class="auth-input-wrap">
        <ion-icon name="shield-checkmark-outline" class="auth-input-icon"></ion-icon>
        <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="confirmPassword"
          placeholder="Repeat your password" class="auth-input"
          [class.auth-input--error]="confirmPassword && confirmPassword !== newPassword" />
      </div>

      <div *ngIf="errorMessage" class="auth-error">
        <ion-icon name="alert-circle-outline"></ion-icon>
        {{ errorMessage }}
      </div>

      <button (click)="resetPassword()" [disabled]="isLoading" class="auth-btn">
        <ion-icon name="checkmark-outline"></ion-icon>
        {{ isLoading ? 'Resetting...' : 'Reset password' }}
      </button>

    </div>

    <div *ngIf="success" class="auth-alert-success">
      <ion-icon name="checkmark-circle-outline"></ion-icon>
      Password reset!
    </div>

  </div>
</div>
