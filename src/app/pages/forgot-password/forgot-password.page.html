<div class="fullForm mt-4">
  <div class="form-container">
    <h2>Forgot Password</h2>
    <p>Enter your email and we'll send you a reset link.</p>

    <div *ngIf="!submitted">
      <div class="form-group">
        <input type="email" [(ngModel)]="email" class="form-control" placeholder="Enter your email" />
      </div>
      <button (click)="sendReset()" [disabled]="isLoading" class="mt-4 mb-4">
        {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
      </button>
    </div>

    <div *ngIf="submitted" class="alert-success">
      ✅ Reset link sent! Check your email inbox.
    </div>

    <div *ngIf="errorMessage" class="text-danger">
      {{ errorMessage }}
    </div>

    <p class="mt-3"><a routerLink="/login">← Back to Login</a></p>
  </div>
</div>
