<div class="auth-page">
  <div class="auth-card">

    <div class="auth-icon-box">
      <ion-icon name="lock-closed-outline"></ion-icon>
    </div>

    <h2 class="auth-title">Forgot password</h2>
    <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>

    <div *ngIf="!submitted">
      <label class="auth-label">Email address</label>
      <div class="auth-input-wrap">
        <ion-icon name="mail-outline" class="auth-input-icon"></ion-icon>
        <input type="email" [(ngModel)]="email" placeholder="you@example.com" class="auth-input" />
      </div>

      <div *ngIf="errorMessage" class="auth-error">
        <ion-icon name="alert-circle-outline"></ion-icon>
        {{ errorMessage }}
      </div>

      <button (click)="sendReset()" [disabled]="isLoading" class="auth-btn">
        <ion-icon name="send-outline"></ion-icon>
        {{ isLoading ? 'Sending...' : 'Send reset link' }}
      </button>
    </div>

    <div *ngIf="submitted" class="auth-alert-success">
      <ion-icon name="checkmark-circle-outline"></ion-icon>
      Reset link sent! Check your email inbox.
    </div>

    <a routerLink="/login" class="auth-back-link">
      <ion-icon name="arrow-back-outline"></ion-icon>
      Back to login
    </a>

  </div>
</div>
