<ion-header class="ion-no-border">
  <ion-toolbar class="settings-toolbar">
    <div class="flex items-center justify-between px-4 py-2">
      <button (click)="goBack()" class="icon-box">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </button>
      <h2 class="text-lg font-bold text-white">Settings</h2>
      <div class="w-10"></div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="settings-content" [fullscreen]="true">
  <div class="px-4 py-4 pb-24">
    <div class="card mb-4 flex items-center gap-4">
      <div class="profile-avatar">
        <ion-icon name="person-outline"></ion-icon>
      </div>
      <div>
        <p class="text-white font-bold">{{ userName }}</p>
        <p class="text-xs text-[#8892A4]">{{ userEmail }}</p>
        <span class="badge-info mt-1 inline-block">{{ userRole }}</span>
      </div>
    </div>
    <p class="section-title">Speed Alerts</p>
    <div class="card mb-4">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-3">
          <div class="icon-box-primary">
            <ion-icon name="speedometer-outline"></ion-icon>
          </div>
          <div>
            <p class="list-item-title">Speed Limit</p>
            <p class="list-item-subtitle">Alert when exceeded</p>
          </div>
        </div>
        <span class="badge-warning text-base font-bold">{{ speedLimit }} km/h</span>
      </div>
      <input type="range" [(ngModel)]="speedLimit" (ngModelChange)="saveSettings()" min="30" max="160" step="10"
        class="speed-slider w-full" />
      <div class="flex justify-between text-xs text-[#4B5563] mt-1">
        <span>30</span><span>80</span><span>120</span><span>160</span>
      </div>
    </div>
    <p class="section-title">Notifications</p>
    <div class="card mb-4">
      <div class="settings-row">
        <div class="flex items-center gap-3">
          <div class="icon-box">
            <ion-icon name="phone-portrait-outline"></ion-icon>
          </div>
          <div>
            <p class="list-item-title">Vibration Alert</p>
            <p class="list-item-subtitle">Vibrate on overspeed</p>
          </div>
        </div>
        <ion-toggle [(ngModel)]="vibrationEnabled" (ngModelChange)="saveSettings()" class="custom-toggle"></ion-toggle>
      </div>
      <div class="divider"></div>
      <div class="settings-row">
        <div class="flex items-center gap-3">
          <div class="icon-box">
            <ion-icon name="notifications-outline"></ion-icon>
          </div>
          <div>
            <p class="list-item-title">Sound Alert</p>
            <p class="list-item-subtitle">Beep on overspeed</p>
          </div>
        </div>
        <ion-toggle [(ngModel)]="soundEnabled" (ngModelChange)="saveSettings()" class="custom-toggle"></ion-toggle>
      </div>
    </div>
    <p class="section-title">Tracking</p>
    <div class="card mb-4">
      <div class="settings-row">
        <div class="flex items-center gap-3">
          <div class="icon-box">
            <ion-icon name="location-outline"></ion-icon>
          </div>
          <div>
            <p class="list-item-title">Background Tracking</p>
            <p class="list-item-subtitle">Track when app minimized</p>
          </div>
        </div>
        <ion-toggle [(ngModel)]="backgroundTracking" (ngModelChange)="saveSettings()"
          class="custom-toggle"></ion-toggle>
      </div>
      <div class="divider"></div>
    </div>
    <button (click)="logout()" class="btn-danger">
      <span class="flex items-center justify-center gap-2">
        <ion-icon name="log-out-outline"></ion-icon>
        Sign Out
      </span>
    </button>

  </div>
</ion-content>
